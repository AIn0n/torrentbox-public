services:
  dashy:
    # The image to pull + version. Can use `ghcr.io/lissy93/dashy` instead
    image: lissy93/dashy:latest
    # Optional container name
    container_name: dashy
    # Port to serve on (keep container port (second one) as 8080)
    ports:
      - 8080:8080
    # Mount a directory containing your conf.yml and any other assets
    volumes:
      - ${REPO_DIR}/dashy/data:/app/user-data
    # Add any env vars for server here, if needed
    environment:
      - NODE_ENV=production
    # Auto-start the container on boot
    restart: unless-stopped
    # Healthcheck to determine when container healthy
    healthcheck:
      test: ['CMD', 'node', '/app/services/healthcheck.js']
      interval: 1m30s
      timeout: 10s
      retries: 3
      start_period: 30s

  uptime-kuma:
    container_name: uptime-kuma
    image: louislam/uptime-kuma:2
    restart: unless-stopped
    volumes:
        - ${SMALL_SSD_DIR}/services_data/kuma:/app/data
    ports:
        # <Host Port>:<Container Port>
        - "3001:3001"

  homarr:
    container_name: homarr
    image: ghcr.io/homarr-labs/homarr:latest
    restart: unless-stopped
    volumes:
        - /var/run/docker.sock:/var/run/docker.sock:ro # Optional, only if you want docker integration
        - ./homarr/appdata:/appdata
    environment:
        - SECRET_ENCRYPTION_KEY=${HOMAR_ENC_KEY}
    ports:
        - "7575:7575"

  glances:
    container_name: glances
    # See all images tags here: https://hub.docker.com/r/nicolargo/glances/tags
    image: nicolargo/glances:latest-full
    restart: always

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:61208/api/4/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    pid: "host"

    ports:
      - "61208:61208"
      - "61209:61209"

    read_only: true
    privileged: false
    # Uncomment next line for SATA or NVME smartctl monitoring
    cap_add:
      - SYS_RAWIO
      - SYS_ADMIN
    devices:
      - "/dev/nvme0"
      - "/dev/sda"

    volumes:
      - "/:/rootfs:ro"
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "/etc/os-release:/etc/os-release:ro"

    tmpfs:
      - /tmp

    environment:
      - GLANCES_OPT=-C /glances/conf/glances.conf -w --enable-plugin smart
      # Please set to your local timezone (or use local ${TZ} environment variable if set on your host)
      - TZ=Europe/Warsaw
      - PYTHONPYCACHEPREFIX=/tmp/py_caches
